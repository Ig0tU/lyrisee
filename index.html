<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyrisee — Kinetic Typography Engine</title>
  <meta name="description" content="A kinetic typography engine that synchronizes lyrics to audio or video." />
  <meta property="og:title" content="Lyrisee — Kinetic Typography Engine" />
  <meta property="og:description" content="A kinetic typography engine that synchronizes lyrics to audio or video." />
  <meta property="og:url" content="https://lyrisee.com/" />
  <meta property="og:site_name" content="Lyrisee" />
  <meta property="og:image" content="https://lyrisee.com/preview.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lyrisee — Kinetic Typography Engine" />
  <meta name="twitter:description" content="A kinetic typography engine that synchronizes lyrics to audio or video." />
  <meta name="twitter:image" content="https://lyrisee.com/preview.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Dancing+Script:wght@700&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<style>
  :root{
    --ink:#ECEAE4; --dim:#8C8A84; --faint:#6f6e69; --bg:#000;
    --line:rgba(236,234,228,.16); --panel:rgba(20,20,21,.86);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink)}
  #stage{position:fixed;inset:0;background:#000;transition:background-color .8s ease}
  #three-canvas{position:absolute;inset:0;display:block}
  /* render layers stay hidden until playback begins (no bleed behind the intro) */
  #three-canvas,#dom-layer,#embody-layer{opacity:0;transition:opacity .5s ease}
  #stage.playing #three-canvas,#stage.playing #dom-layer,#stage.playing #embody-layer{opacity:1}
  /* Embodiment layer: words-as-imagery + line reconstruction (DOM — works without WebGL) */
  #embody-layer{position:absolute;inset:0;display:none;overflow:hidden}
  .ew{position:absolute;left:50%;top:50%;font-family:'Archivo Black','Inter',sans-serif;font-weight:900;white-space:nowrap;
      font-size:clamp(14px,2.2vw,32px);color:var(--ink,#EDEAE4);line-height:1;will-change:transform,opacity;
      transition:transform .5s cubic-bezier(.18,.9,.2,1), opacity .35s ease, color .15s, text-shadow .15s}
  .ew.fn{color:#7c8aa0}
  .ew.sung{color:#fff;text-shadow:0 0 24px rgba(255,255,255,.6),0 0 6px rgba(255,255,255,.5);z-index:3}
  /* cinematic word-art: embedded symbol + figure for scene lines (cage, peace, etc.) */
  .esym{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.5);font-size:min(44vh,44vw);
        color:#EDEAE4;opacity:0;z-index:0;pointer-events:none;
        transition:opacity .6s ease, transform .8s cubic-bezier(.2,.85,.2,1)}
  .esym.on{opacity:.9;transform:translate(-50%,-50%) scale(1)}
  .efig{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);font-size:min(30vh,30vw);
        opacity:.45;z-index:0;pointer-events:none;filter:grayscale(1) contrast(.8);
        transition:transform 1s cubic-bezier(.2,.85,.2,1), opacity .8s ease}
  .efig.free{transform:translate(-50%,-160%);opacity:0}
  /* Director per-word art-direction: register / glow / icon (Die Alone vocabulary) */
  .ew.script{font-family:'Dancing Script','Inter',cursive;font-weight:700;color:var(--accent,#ff9ec4);text-shadow:0 0 16px rgba(0,0,0,.0)}
  .ew.heavy{font-family:'Archivo Black','Inter',sans-serif;font-weight:900;letter-spacing:.01em}
  .ew.glow{text-shadow:0 0 20px rgba(255,255,255,.65),0 0 8px rgba(255,255,255,.5)}
  .ew .ic{display:inline-block;font-size:1.5em;line-height:1;vertical-align:-0.12em;margin:0 .06em;filter:drop-shadow(0 0 10px rgba(255,255,255,.45))}
  /* DOM lyric layer (rhyme scheme / karaoke) */
  /* Rhyme Scheme = the emNoFavors rhyme-map: left-aligned lyric block, true rhyme families boxed in color */
  #dom-layer{position:absolute;inset:0;display:none;flex-direction:column;justify-content:flex-start;align-items:flex-start;
             padding:64px 6vw 6vh;overflow:hidden;background:#d7d7d4;color:#141414;pointer-events:none}
  #dom-head{position:absolute;top:0;left:0;right:0;height:46px;background:#0c0c0c;color:#f4f1ea;display:flex;align-items:center;
            justify-content:space-between;padding:0 22px;font-family:'Archivo Black','Inter',sans-serif;font-size:14px;letter-spacing:.05em;text-transform:uppercase;z-index:2}
  #dom-head .lg{font-family:'Anton','Archivo Black',sans-serif;color:#fff;letter-spacing:.07em;font-size:18px}
  #dom-lines{width:100%;max-width:1240px;will-change:transform;transition:transform .55s cubic-bezier(.2,.8,.2,1)}
  #dom-layer .line{line-height:1.42;margin:.03em 0;opacity:.4;transition:opacity .3s ease}
  #dom-layer .line.active{opacity:1}
  #dom-layer .w{display:inline-block;font-family:'Inter',sans-serif;font-weight:800;font-size:clamp(15px,2.25vw,32px);
                padding:.03em .12em;border-radius:.14em;color:#161616;white-space:pre}
  #dom-layer .w.rg{color:#0a0a0a}
  #dom-layer .w.sung{outline:2px solid #111;outline-offset:1px}
  /* Intro / ingest */
  #intro{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:5vh 6vw;
          background:radial-gradient(120% 120% at 50% 38%, rgba(16,16,17,.55), rgba(0,0,0,.94));transition:opacity .6s ease}
  #intro h1{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.06em;font-size:clamp(40px,8vw,118px);margin:0;line-height:.92;color:#F4F1EA}
  #intro .sub{color:var(--dim);font-size:clamp(12px,1.4vw,16px);letter-spacing:.34em;text-transform:uppercase;margin-top:12px}
  #ingest{margin-top:34px;width:min(560px,90vw);display:flex;flex-direction:column;align-items:stretch;gap:14px}
  .drop{border:1.5px dashed var(--line);border-radius:14px;padding:30px 22px;cursor:pointer;color:var(--dim);font-size:15px;transition:border-color .2s,background .2s,color .2s}
  .drop:hover,.drop.over{border-color:#bdbab2;background:rgba(236,234,228,.04);color:var(--ink)}
  .drop b{color:var(--ink);font-weight:800}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .ghost{font-family:'Inter';font-weight:600;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 14px;cursor:pointer;transition:border-color .15s}
  .ghost:hover{border-color:#7a786f}
  .ghost:disabled{opacity:.45;cursor:not-allowed}
  #ingestStatus{min-height:1.3em;font-size:12.5px;color:var(--dim);line-height:1.5}
  #logPanel{display:none;margin-top:8px;background:#0a0a0a;border:1px solid var(--line);border-radius:8px;padding:8px 10px;max-height:140px;overflow-y:auto;font-family:'Courier New',monospace;font-size:11px;line-height:1.55;color:#8a8}
  #logPanel .log-line{white-space:pre-wrap;word-break:break-all}
  #logPanel .log-err{color:#f87}
  #logPanel .log-done{color:#4f9}
  #logTimer{display:inline-block;font-variant-numeric:tabular-nums;color:var(--faint);font-size:11px;margin-left:6px}
  #playBtn{align-self:center;margin-top:2px;font-family:'Inter';font-weight:800;font-size:16px;letter-spacing:.03em;padding:14px 46px;border-radius:999px;border:0;cursor:pointer;
           color:#0b0b0c;background:#F2EFE8;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .15s, box-shadow .15s, background .15s, opacity .2s}
  #playBtn:hover:not(:disabled){transform:translateY(-2px);background:#fff;box-shadow:0 14px 40px rgba(0,0,0,.6)}
  #playBtn:disabled{opacity:.4;cursor:not-allowed}
  .demo{font-size:12.5px;color:var(--faint)}
  .tog-track{display:inline-flex;align-items:center;width:36px;height:20px;border-radius:10px;background:#2a2a2b;border:1px solid var(--line);transition:background .2s;flex-shrink:0}
  .tog-track.on{background:#4a9eff;border-color:#4a9eff}
  .tog-thumb{width:14px;height:14px;border-radius:50%;background:#fff;margin-left:2px;transition:margin-left .2s;flex-shrink:0}
  .tog-track.on .tog-thumb{margin-left:18px}
  .demo a{color:var(--dim);text-decoration:underline;cursor:pointer}
  .demo a:hover{color:var(--ink)}
  #introNote{margin-top:24px;font-size:11.5px;color:var(--faint);max-width:520px;line-height:1.6}
  /* Top bar */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:14px;padding:14px 18px;
          background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,0));opacity:0;transition:opacity .3s;pointer-events:none}
  #stage.playing #topbar{opacity:1;pointer-events:auto}
  .brand{font-family:'Anton';font-size:20px;letter-spacing:.05em;color:#F4F1EA}
  .brand small{font-family:'Inter';font-weight:600;font-size:11px;letter-spacing:.22em;color:var(--dim);margin-left:8px;text-transform:uppercase}
  .track{font-size:12px;color:var(--dim);max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .spacer{flex:1}
  select{font-family:'Inter';font-weight:600;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 12px;cursor:pointer;outline:none}
  select:hover{border-color:#7a786f}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);padding-left:2px}
  #constructDesc{max-width:340px;font-size:11.5px;color:var(--dim);line-height:1.45}
  /* Transport */
  #transport{position:absolute;left:0;right:0;bottom:0;z-index:30;display:flex;align-items:center;gap:14px;padding:16px 20px 18px;
             background:linear-gradient(0deg,rgba(0,0,0,.6),rgba(0,0,0,0));opacity:0;transition:opacity .3s;pointer-events:none}
  #stage.playing #transport{opacity:1;pointer-events:auto}
  #ppBtn{width:44px;height:44px;border-radius:50%;border:0;background:#F2EFE8;color:#111;font-size:18px;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  #ppBtn:hover{background:#fff}
  #scrub{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:#2a2a2b;cursor:pointer}
  #scrub::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(236,234,228,.18)}
  #scrub::-moz-range-thumb{width:15px;height:15px;border:0;border-radius:50%;background:#fff}
  #time{font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--dim);min-width:96px;text-align:center}
  .mini{font-size:12px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer}
  .mini:hover{border-color:#7a786f;color:var(--ink)}
  #hint{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);z-index:25;font-size:11px;letter-spacing:.1em;color:var(--faint);opacity:0;transition:opacity .4s}
  #stage.playing #hint{opacity:.8}
  /* Lyric editor (human-in-the-loop transcript correction) */
  #editor{position:absolute;inset:0;z-index:50;display:none;flex-direction:column;background:rgba(8,8,9,.97);backdrop-filter:blur(3px);padding:3.4vh 4vw}
  #editor.open{display:flex}
  .ed-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .ed-head span{font-family:'Anton';font-size:24px;letter-spacing:.04em;color:#F4F1EA}
  .ed-hint{color:var(--dim);font-size:12.5px;margin-bottom:14px;max-width:780px;line-height:1.55}
  #edList{flex:1;overflow:auto;display:flex;flex-direction:column;gap:7px;padding-right:6px}
  .ed-row{display:flex;gap:8px;align-items:center}
  .ed-t{width:78px;flex:0 0 auto;font-variant-numeric:tabular-nums;background:#161617;border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:8px;font-size:12px}
  .ed-x{flex:1;background:#161617;border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:9px 11px;font-size:14px;font-family:'Inter'}
  .ed-x:focus,.ed-t:focus{outline:none;border-color:#7a786f}
  .ed-del{flex:0 0 auto;width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;font-size:16px;line-height:1}
  .ed-del:hover{color:#fff;border-color:#7a786f}
  .ed-foot{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
  .ghost-solid{font-family:'Inter';font-weight:800;font-size:14px;color:#0b0b0c;background:#F2EFE8;border:0;border-radius:9px;padding:11px 22px;cursor:pointer}
  .ghost-solid:hover{background:#fff}

  .bg-plain { background: #111; }
  .bg-generic { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
  .bg-textured { background: radial-gradient(circle at center, #2b2b2c 0%, #111 100%), url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.1"/></svg>'); background-blend-mode: overlay; }

  #watermarkUI{position:absolute;bottom:30px;right:30px;z-index:45;font-family:'Anton',sans-serif;font-size:32px;letter-spacing:0.05em;color:rgba(255,255,255,0.3);pointer-events:none;display:none;}
  #watermarkUI.show{display:block;}
</style>
</head>
<body>

  <video id="bgVideo" playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s;z-index:0;"></video>
  <div id="bgLayer" style="position:absolute;inset:0;z-index:0;opacity:0;transition:opacity 0.5s;background-size:cover;background-position:center;"></div>
  <canvas id="three-canvas"></canvas>
  <div id="dom-layer"></div>
  <div id="embody-layer"></div>

  <div id="topbar">
    <div class="brand">LYRISEE<small>Kinetic Typography</small></div>
    <div class="track" id="trackName"></div>
    <div class="spacer"></div>
  </div>
